<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mhumsap – Login to your account">
  <title>Mhumsap – Login</title>
  <link rel="stylesheet" href="../css/globals.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body">

  <!-- NAVBAR -->
  <header class="navbar">
    <button class="nav-hamburger" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <img src="../images/logo.png" alt="Mhumsap" class="nav-logo">
    <nav class="nav-links" aria-label="Main navigation">
      <a href="home.html">Home</a>
      <a href="login.html" class="active">Login</a>
      <a href="search.html">Search</a>
      <a href="team.html">Team</a>
      <a href="products.html">Products</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="login-main">

    <!-- Hero logo -->
    <img src="../images/MhumsapLogo.png" alt="Mhumsap" class="hero-logo">

    <!-- Login card -->
    <div class="login-card">
      <h1 class="login-card-title">Sign in to Mhumsap</h1>

      <!-- Member login button -->
      <button class="login-btn" type="button" id="memberLoginBtn" aria-label="Login as Member">
        <img src="../images/icons/User.svg" alt="">
        <span>Member Account</span>
      </button>

      <!-- Admin login button -->
      <button class="login-btn" type="button" id="adminLoginBtn" aria-label="Login as Administrator">
        <img src="../images/icons/Lock.svg" alt="">
        <span>Administrator Account</span>
      </button>

      <!-- Divider -->
      <div class="login-divider">or</div>

      <!-- Guest link -->
      <a href="home.html" class="guest-link">Continue as Guest</a>
    </div>

  </main>

</body>
</html>
